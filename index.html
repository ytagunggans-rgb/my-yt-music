<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YT Music PRO - Stabil Selamanya</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');

        :root {
            --bg-color: #030303;
            --surface-color: #1d1d1d;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --yt-red: #ff0000;
            --hover-bg: rgba(255,255,255,0.1);
        }

        body {
            margin: 0; font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color); color: var(--text-primary);
            height: 100vh; display: flex; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        /* Sidebar (Desktop) / Bottom Nav (Mobile) */
        .sidebar { 
            width: 72px; border-right: 1px solid rgba(255,255,255,0.1); 
            display: flex; flex-direction: column; align-items: center; 
            padding-top: 15px; gap: 25px; z-index: 1000; background: var(--bg-color);
        }
        .sidebar-item { 
            display: flex; flex-direction: column; align-items: center; 
            color: var(--text-secondary); font-size: 0.65rem; cursor: pointer; gap: 5px;
        }
        .sidebar-item.active, .sidebar-item:hover { color: white; }
        .sidebar-item span { font-size: 1.6rem; }

        .content-wrapper { flex: 1; display: flex; flex-direction: column; height: calc(100vh - 90px); }
        
        /* Topbar */
        .topbar { 
            display: flex; align-items: center; padding: 15px 30px; gap: 20px; 
            background: rgba(3,3,3,0.9); backdrop-filter: blur(10px); z-index: 50;
        }
        .logo-container { display: flex; align-items: center; gap: 8px; }
        
        .search-bar {
            flex: 1; max-width: 480px; background: var(--hover-bg);
            border-radius: 8px; display: flex; align-items: center; padding: 8px 15px;
            margin-left: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; font-size: 1rem;}

        .main-container { position: relative; flex: 1; overflow: hidden; }

        /* Player View */
        #player-view {
            position: absolute; inset: 0; display: flex; padding: 30px 40px; box-sizing: border-box; gap: 40px; z-index: 10;
            background: #030303; overflow-y: auto; overflow-x: hidden;
        }
        .player-left { flex: 6; display: flex; flex-direction: column; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .video-meta { margin-top: 20px; }
        .video-meta h1 { font-size: 1.6rem; margin: 0; line-height: 1.3; }
        .video-meta p { color: var(--text-secondary); margin: 8px 0; }

        .player-right { flex: 4; background: #111; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #222;}
        .queue-tabs { display: flex; border-bottom: 1px solid #222; padding: 0 15px; }
        .tab { padding: 15px; color: var(--text-secondary); cursor: pointer; font-weight: 500; font-size: 0.85rem; }
        .tab.active { color: white; border-bottom: 2px solid white; }
        .queue-list { flex: 1; overflow-y: auto; padding-bottom: 20px;}
        .q-item { display: flex; align-items: center; padding: 10px 15px; gap: 12px; cursor: pointer; transition: 0.1s; border-bottom: 1px solid rgba(255,255,255,0.02);}
        .q-item:hover { background: var(--hover-bg); }
        .q-item.active { background: rgba(255,0,0,0.1); border-left: 3px solid var(--yt-red); }
        .q-item img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .q-info { flex: 1; overflow: hidden; }
        .q-title { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .q-item.active .q-title { color: var(--yt-red); }

        /* Home View */
        #home-view { 
            position: absolute; inset: 0; padding: 30px; overflow-y: auto; z-index: 20;
            background: linear-gradient(180deg, #2b1d1d 0%, #030303 40%);
            transition: opacity 0.3s ease; padding-bottom: 120px;
        }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { cursor: pointer; transition: 0.3s; position: relative; }
        .card-img { width: 100%; aspect-ratio: 1; border-radius: 6px; object-fit: cover; background: #222; border: 1px solid #333;}
        .play-btn-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; aspect-ratio: 1;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.2s; border-radius: 6px;
        }
        .card:hover .play-btn-overlay { opacity: 1; }
        .card-title { margin-top: 10px; font-weight: 500; font-size: 0.95rem; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .card-desc { color: var(--text-secondary); font-size: 0.8rem; margin-top: 4px; }

        /* Bottom Bar (Mini Player) */
        .bottom-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
            background: #1d1d1d; border-top: 1px solid #333; display: flex; align-items: center;
            padding: 0 20px; z-index: 900; justify-content: space-between;
        }
        .b-info { display: flex; align-items: center; gap: 15px; width: 35%; cursor: pointer; flex: 1;}
        .b-thumb { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; background: #333; }
        .b-text { flex: 1; overflow: hidden; }
        .b-controls { display: flex; align-items: center; gap: 20px; justify-content: center;}
        .btn-main { background: white; color: black; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;}
        .btn-main:active { transform: scale(0.95); }
        .btn-side { color: white; background: none; border: none; cursor: pointer; display: flex; align-items: center; }
        .progress-container { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #444; cursor: pointer; }
        .progress-bar { height: 100%; background: var(--yt-red); width: 0%; position: relative; transition: 0.1s linear;}
        .b-extra { width: 30%; display: flex; justify-content: flex-end; gap: 15px; color: #aaa; }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ff0000;
            color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 0.9rem;
            z-index: 9999; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 85%; text-align: center;
        }

        /* ==========================================
           MOBILE RESPONSIVE (MAX-WIDTH 768PX)
        ========================================== */
        @media screen and (max-width: 768px) {
            body { flex-direction: column; }
            
            /* Ubah Sidebar jadi Bottom Nav */
            .sidebar { 
                flex-direction: row; width: 100%; height: 60px; padding-top: 0; 
                justify-content: space-around; border-right: none; border-top: 1px solid #333;
                position: fixed; bottom: 0; left: 0; right: 0;
            }
            .sidebar-item { justify-content: center; gap: 2px; }

            /* Sesuaikan Content Wrapper */
            .content-wrapper { height: 100vh; }
            
            /* Sesuaikan Topbar & Search */
            .topbar { padding: 10px 15px; gap: 10px; }
            .logo-text { display: none; } /* Sembunyikan teks Music, sisa icon */
            .search-bar { margin-left: 0; padding: 6px 12px; }
            .search-bar input { font-size: 0.9rem; }

            /* Sesuaikan View Player (Atas Bawah) */
            #player-view { flex-direction: column; padding: 15px; gap: 20px; padding-bottom: 160px; }
            .player-left { flex: none; }
            .player-right { flex: none; border: none; background: transparent; height: auto;}
            .queue-list { overflow: visible; } /* Agar bisa di-scroll bersama halaman */

            /* Sesuaikan View Home */
            #home-view { padding: 15px; padding-bottom: 160px; }
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 15px; }

            /* Sesuaikan Bottom Bar (Mini Player) - Naik ke atas Bottom Nav */
            .bottom-bar { 
                bottom: 60px; height: 65px; padding: 0 10px; 
            }
            .b-thumb { width: 40px; height: 40px; }
            .b-info { width: auto; gap: 10px;}
            .b-extra { display: none; } /* Sembunyikan icon volume di HP */
            .btn-main { width: 38px; height: 38px; }
            .b-controls { gap: 15px; }
            
            #b-title { max-width: 130px; font-size: 0.85rem;}
            .video-meta h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="toast"><span class="material-symbols-outlined" style="vertical-align: middle;">error</span> Video diblokir! Auto-skip...</div>

    <div class="sidebar">
        <div class="sidebar-item active" id="btn-nav-home" onclick="showView('home')">
            <span class="material-symbols-outlined">home</span>Beranda
        </div>
        <div class="sidebar-item" onclick="alert('Fitur Eksplorasi segera hadir!')">
            <span class="material-symbols-outlined">explore</span>Eksplorasi
        </div>
        <div class="sidebar-item" onclick="alert('Koleksi kamu tersimpan lokal.')">
            <span class="material-symbols-outlined">library_music</span>Koleksi
        </div>
    </div>

    <div class="content-wrapper">
        <div class="topbar">
            <div class="logo-container">
                <span class="material-symbols-outlined" style="color:red; font-variation-settings: 'FILL' 1; font-size: 1.8rem;">play_circle</span>
                <span class="logo-text" style="font-weight:900; font-size:1.2rem; letter-spacing:-1px;">Music</span>
            </div>
            <div class="search-bar">
                <span class="material-symbols-outlined" style="color:var(--text-secondary);">search</span>
                <input type="text" id="searchInput" placeholder="Telusuri lagu, artis...">
            </div>
        </div>

        <div class="main-container">
            <div id="player-view">
                <div class="player-left">
                    <div class="video-box" id="yt-player"></div>
                    <div class="video-meta">
                        <h1 id="p-title">Pilih Lagu</h1>
                        <p id="p-artist">YouTube Music</p>
                    </div>
                </div>
                <div class="player-right">
                    <div class="queue-tabs">
                        <div class="tab active">BERIKUTNYA</div>
                        <div class="tab" onclick="alert('Fitur lirik menyusul')">LIRIK</div>
                    </div>
                    <div class="queue-list" id="queue-list"></div>
                </div>
            </div>

            <div id="home-view">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:5px;">
                    <img src="https://i.pravatar.cc/100?u=putihbiru" style="width:36px; height:36px; border-radius:50%;" alt="Profile">
                    <span style="color:var(--text-secondary); font-weight:500; font-size: 0.9rem;">PUTIH BIRU</span>
                </div>
                <h2 style="margin-top: 10px; font-size: 1.5rem;">Dengarkan lagi</h2>
                <div class="grid-container" id="grid-home"></div>
                <div id="no-results" style="display:none; text-align:center; color:#aaa; margin-top:30px;">
                    Lagu atau artis tidak ditemukan.
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="progress-container" onclick="seek(event)">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <div class="b-info" onclick="showView('player')">
            <img src="https://via.placeholder.com/50" id="b-thumb" class="b-thumb">
            <div class="b-text">
                <div id="b-title" style="font-weight:500; font-size:0.9rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">Pilih Lagu</div>
                <div id="b-artist" style="color:#aaa; font-size:0.75rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">-</div>
            </div>
        </div>
        <div class="b-controls">
            <button class="btn-side" onclick="prevSong()"><span class="material-symbols-outlined">skip_previous</span></button>
            <div class="btn-main" onclick="togglePlay()"><span class="material-symbols-outlined" id="play-icon">play_arrow</span></div>
            <button class="btn-side" onclick="nextSong()"><span class="material-symbols-outlined">skip_next</span></button>
        </div>
        <div class="b-extra">
            <span class="material-symbols-outlined">volume_up</span>
            <span class="material-symbols-outlined" style="cursor:pointer;" onclick="showView('player')">expand_less</span>
        </div>
    </div>

    <script>
        const myPlaylist = [
            { id: "9KnngSa6vk4", title: "Calon Mantu Idaman (feat. Ncum)", artist: "Rombongan Bodonk Koplo" },
            { id: "IrdruPzbWLM", title: "RYO - Cuma Temen + main-main!", artist: "antinrml" },
            { id: "LMIS2PMqCL0", title: "dia & INDAHKUS - MALU MALU", artist: "antinrml" },
            { id: "ivZOeCbKPFM", title: "Geleng Geleng", artist: "Naykilla & Yung Caters" },
            { id: "RJ-um7r3R8o", title: "SUPER EKSIS", artist: "Naufal Syachreza" },
            { id: "4STthLskCbk", title: "1/10 (Sped Up)", artist: "RYO & Tenxi" },
            { id: "VKP1t3gQ_o0", title: "SINTA AND JOJO KEONG RACUN", artist: "Starky Aji" },
            { id: "xQlS1a99vwk", title: "Taruh", artist: "Nadin Amizah" },
            { id: "9bZaxxlrzbI", title: "Di Akhir Perang", artist: "Nadin Amizah" },
            { id: "zkBjx_4OwmQ", title: "Bahagia Itu Sederhana", artist: "Cita Citata" },
            { id: "SQQWEbu88QQ", title: "Pura Pura Bahagia", artist: "Cita Citata" },
            { id: "vnZuvtWUVrE", title: "Meriang", artist: "Cita Citata" },
            { id: "xoUQ8wNWwq4", title: "Cuma Temen", artist: "RYO" },
            { id: "heukr71gj9I", title: "main-main!", artist: "RYO & Josua Natanael" },
            { id: "aIWpGeXMfrI", title: "mejikuhibiniu", artist: "Tenxi , suisei & Jemsii" },
            { id: "En-EHqRk8yg", title: "Garam & Madu (Sakit Dadaku)", artist: "Tenxi" },
            { id: "5B-VDNc6PAo", title: "Alamak", artist: "Rizky Febian & Adrian Khalif" },
            { id: "9QtRcfQ0kyY", title: "Sorai", artist: "Nadin Amizah" }
        ];

        let player;
        let currentIndex = 0;

        // FITUR MERENDER UI & PENCARIAN (SEARCH)
        function renderUI(searchQuery = '') {
            const grid = document.getElementById('grid-home');
            const queue = document.getElementById('queue-list');
            const noResults = document.getElementById('no-results');
            
            grid.innerHTML = '';
            queue.innerHTML = '';
            let matchCount = 0;
            const query = searchQuery.toLowerCase();
            
            myPlaylist.forEach((song, i) => {
                // Filter logika pencarian
                if (query && !song.title.toLowerCase().includes(query) && !song.artist.toLowerCase().includes(query)) {
                    return; // Skip lagu yang tidak cocok
                }
                matchCount++;

                const thumb = `https://img.youtube.com/vi/${song.id}/hqdefault.jpg`;
                
                // Render Home Grid
                grid.innerHTML += `
                    <div class="card" onclick="playSong(${i})">
                        <div class="card-img-wrapper" style="width:100%; aspect-ratio:1; overflow:hidden; border-radius:6px; position:relative;">
                            <img src="${thumb}" style="width:100%; height:100%; object-fit:cover;" alt="Thumbnail">
                            <div class="play-btn-overlay"><span class="material-symbols-outlined" style="font-size:3rem; color:white;">play_circle</span></div>
                        </div>
                        <div class="card-title">${song.title}</div>
                        <div class="card-desc">${song.artist}</div>
                    </div>`;
                
                // Render Antrean (Queue)
                queue.innerHTML += `
                    <div class="q-item" id="q-item-${i}" onclick="playSong(${i})">
                        <img src="${thumb}" alt="Thumb">
                        <div class="q-info">
                            <div class="q-title">${song.title}</div>
                            <div style="font-size:0.75rem; color:#aaa;">${song.artist}</div>
                        </div>
                    </div>`;
            });

            // Tampilkan tulisan jika tidak ada hasil
            noResults.style.display = matchCount === 0 ? 'block' : 'none';
            
            // Highlight lagu yang sedang diputar di antrean baru
            updateQueueHighlight();
        }

        // Listener untuk Search Bar
        document.getElementById('searchInput').addEventListener('input', function(e) {
            renderUI(e.target.value);
            showView('home'); // Buka halaman home ketika mengetik pencarian
        });

        // Inisialisasi awal
        renderUI();

        // Setup YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%', width: '100%',
                videoId: myPlaylist[0].id,
                playerVars: { controls: 1, rel: 0, origin: window.location.origin, playsinline: 1 },
                events: { 
                    'onReady': onPlayerReady,
                    'onStateChange': onStateChange,
                    'onError': onPlayerError 
                }
            });
        }

        function onPlayerReady() {
            updateMetadata(0);
            setInterval(() => {
                if(player && player.getCurrentTime && player.getDuration) {
                    const duration = player.getDuration();
                    if(duration > 0) {
                        const perc = (player.getCurrentTime() / duration) * 100;
                        document.getElementById('p-bar').style.width = perc + '%';
                    }
                }
            }, 500);
        }

        function onPlayerError() {
            document.getElementById('toast').style.display = 'block';
            setTimeout(() => document.getElementById('toast').style.display = 'none', 4000);
            setTimeout(nextSong, 1500); // OTOMATIS SKIP
        }

        function playSong(index) {
            currentIndex = index;
            if (player && player.loadVideoById) player.loadVideoById(myPlaylist[index].id);
            updateMetadata(index);
            showView('player'); 
        }

        function nextSong() {
            currentIndex = (currentIndex + 1) % myPlaylist.length;
            playSong(currentIndex);
        }

        function prevSong() {
            currentIndex = (currentIndex - 1 + myPlaylist.length) % myPlaylist.length;
            playSong(currentIndex);
        }

        function onStateChange(e) {
            const icon = document.getElementById('play-icon');
            if(e.data === YT.PlayerState.PLAYING) icon.innerText = 'pause';
            else if (e.data === YT.PlayerState.ENDED) nextSong(); 
            else icon.innerText = 'play_arrow';
        }

        function updateQueueHighlight() {
            document.querySelectorAll('.q-item').forEach(el => el.classList.remove('active'));
            let act = document.getElementById(`q-item-${currentIndex}`);
            if(act) {
                act.classList.add('active');
                act.scrollIntoView({ behavior: "smooth", block: "nearest" });
            }
        }

        function updateMetadata(idx) {
            const song = myPlaylist[idx];
            const thumb = `https://img.youtube.com/vi/${song.id}/hqdefault.jpg`;
            
            document.getElementById('b-title').innerText = song.title;
            document.getElementById('b-artist').innerText = song.artist;
            document.getElementById('b-thumb').src = thumb;
            
            document.getElementById('p-title').innerText = song.title;
            document.getElementById('p-artist').innerText = song.artist;
            
            updateQueueHighlight();
        }

        function showView(v) {
            const home = document.getElementById('home-view');
            const navHome = document.getElementById('btn-nav-home');
            if (v === 'home') {
                home.style.opacity = '1'; home.style.pointerEvents = 'auto';
                navHome.classList.add('active');
            } else {
                home.style.opacity = '0'; home.style.pointerEvents = 'none';
                navHome.classList.remove('active');
            }
        }

        function togglePlay() {
            if(!player || !player.getPlayerState) return;
            const s = player.getPlayerState();
            s === 1 ? player.pauseVideo() : player.playVideo();
        }

        function seek(e) {
            if(!player || !player.getDuration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const p = (e.clientX - rect.left) / rect.width;
            player.seekTo(p * player.getDuration());
        }
    </script>
</body>
</html>
