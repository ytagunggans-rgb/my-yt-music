<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YT Music PRO - Mobile Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        :root {
            --bg: #030303;
            --surface: #121212;
            --accent: #ff0000;
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg); color: var(--text);
            font-family: 'Roboto', sans-serif; overflow: hidden;
        }

        /* --- LAYOUT UTAMA --- */
        .app-container {
            display: flex; flex-direction: column;
            height: 100vh; width: 100%;
        }

        /* --- HEADER --- */
        header {
            padding: 15px 20px; display: flex; align-items: center; gap: 10px;
            background: rgba(3,3,3,0.9); z-index: 100;
        }
        .search-box {
            flex: 1; background: #222; border-radius: 20px;
            padding: 8px 15px; display: flex; align-items: center; gap: 10px;
        }
        .search-box input {
            background: transparent; border: none; color: white; width: 100%; outline: none;
        }

        /* --- AREA CONTENT --- */
        main {
            flex: 1; overflow-y: auto; padding: 20px;
            padding-bottom: 160px; /* Biar gak ketutup player bawah */
        }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        /* --- CARD --- */
        .card { cursor: pointer; }
        .card img {
            width: 100%; aspect-ratio: 1; border-radius: 8px;
            object-fit: cover; background: #222;
        }
        .card-title {
            margin-top: 8px; font-size: 0.85rem; font-weight: 500;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-artist { color: var(--text-dim); font-size: 0.75rem; margin-top: 2px; }

        /* --- PLAYER BESAR (FULLSCREEN DI HP) --- */
        #player-view {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 2000; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 20px;
        }
        #player-view.active { transform: translateY(0); }
        
        .close-player { padding: 10px 0; cursor: pointer; }
        .player-content {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .video-wrapper {
            width: 100%; max-width: 500px; aspect-ratio: 16/9;
            background: #000; border-radius: 12px; overflow: hidden;
        }

        /* --- BOTTOM PLAYER (DITAMBAL BIAR GAK BUG) --- */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: #1a1a1a; border-top: 1px solid #333;
            display: flex; align-items: center; padding: 0 15px; z-index: 1500;
            gap: 12px;
        }
        .b-thumb { width: 45px; height: 45px; border-radius: 4px; object-fit: cover; }
        .b-info { flex: 1; overflow: hidden; }
        .b-info div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .progress-container {
            position: absolute; top: 0; left: 0; right: 0; height: 2px; background: #444;
        }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; }

        /* --- KHUSUS PC --- */
        @media (min-width: 769px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
            #player-view { position: relative; transform: none; display: none; } /* PC pake modal atau layout beda */
        }

        /* --- KHUSUS HP --- */
        @media (max-width: 768px) {
            header h2 { font-size: 1.2rem; }
            .grid { grid-template-columns: 1fr 1fr; } /* 2 Kolom di HP */
            .bottom-bar { height: 65px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <span class="material-symbols-outlined" style="color:red; font-variation-settings: 'FILL' 1; font-size: 28px;">play_circle</span>
            <div class="search-box">
                <span class="material-symbols-outlined" style="font-size: 20px; color: #888;">search</span>
                <input type="text" placeholder="Telusuri musik">
            </div>
        </header>

        <main id="main-content">
            <h2 style="margin-bottom: 20px;">Dengarkan lagi</h2>
            <div class="grid" id="grid-home"></div>
        </main>

        <div id="player-view">
            <div class="close-player" onclick="toggleLargePlayer(false)">
                <span class="material-symbols-outlined">expand_more</span>
            </div>
            <div class="player-content">
                <div class="video-wrapper" id="yt-player"></div>
                <div style="width: 100%; margin-top: 30px;">
                    <h1 id="p-title" style="font-size: 1.4rem; margin: 0;">Judul Lagu</h1>
                    <p id="p-artist" style="color: #aaa; margin: 5px 0;">Artis</p>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="progress-container" onclick="seek(event)">
                <div class="progress-bar" id="p-bar"></div>
            </div>
            <img src="https://via.placeholder.com/50" class="b-thumb" id="b-thumb" onclick="toggleLargePlayer(true)">
            <div class="b-info" onclick="toggleLargePlayer(true)">
                <div id="b-title" style="font-weight: 500; font-size: 0.9rem;">Pilih Lagu</div>
                <div id="b-artist" style="color: #aaa; font-size: 0.75rem;">-</div>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span class="material-symbols-outlined" onclick="togglePlay()" id="play-icon" style="font-size: 32px;">play_arrow</span>
                <span class="material-symbols-outlined" onclick="nextSong()" style="font-size: 32px;">skip_next</span>
            </div>
        </div>
    </div>

    <script>
        const myPlaylist = [
            { id: "9KnngSa6vk4", title: "Calon Mantu Idaman", artist: "Rombongan Bodonk Koplo" },
            { id: "IrdruPzbWLM", title: "RYO - Cuma Temen", artist: "antinrml" },
            { id: "LMIS2PMqCL0", title: "MALU MALU", artist: "antinrml" },
            { id: "ivZOeCbKPFM", title: "Geleng Geleng", artist: "Naykilla" },
            { id: "RJ-um7r3R8o", title: "SUPER EKSIS", artist: "Naufal Syachreza" },
            { id: "4STthLskCbk", title: "1/10 (Sped Up)", artist: "RYO & Tenxi" },
            { id: "xoUQ8wNWwq4", title: "Cuma Temen", artist: "RYO" },
            { id: "heukr71gj9I", title: "main-main!", artist: "RYO" },
            { id: "1sckyCTMhN0", title: "Kicau Mania", artist: "Ndarboy Genk" },
            { id: "9QtRcfQ0kyY", title: "Sorai", artist: "Nadin Amizah" }
        ];

        let player;
        let currentIndex = 0;

        function renderUI() {
            const grid = document.getElementById('grid-home');
            myPlaylist.forEach((song, i) => {
                grid.innerHTML += `
                    <div class="card" onclick="playSong(${i})">
                        <img src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg" loading="lazy">
                        <div class="card-title">${song.title}</div>
                        <div class="card-artist">${song.artist}</div>
                    </div>`;
            });
        }
        renderUI();

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%', width: '100%',
                videoId: myPlaylist[0].id,
                playerVars: { playsinline: 1, controls: 1 },
                events: { 
                    'onReady': () => { setInterval(updateProgress, 500); },
                    'onStateChange': onStateChange
                }
            });
        }

        function playSong(idx) {
            currentIndex = idx;
            player.loadVideoById(myPlaylist[idx].id);
            updateMetadata(idx);
        }

        function toggleLargePlayer(show) {
            document.getElementById('player-view').classList.toggle('active', show);
        }

        function onStateChange(e) {
            const btn = document.getElementById('play-icon');
            if(e.data === 1) btn.innerText = 'pause';
            else if(e.data === 0) nextSong();
            else btn.innerText = 'play_arrow';
        }

        function updateMetadata(idx) {
            const s = myPlaylist[idx];
            document.getElementById('b-title').innerText = s.title;
            document.getElementById('b-artist').innerText = s.artist;
            document.getElementById('b-thumb').src = `https://img.youtube.com/vi/${s.id}/default.jpg`;
            document.getElementById('p-title').innerText = s.title;
            document.getElementById('p-artist').innerText = s.artist;
        }

        function nextSong() { currentIndex = (currentIndex + 1) % myPlaylist.length; playSong(currentIndex); }
        function togglePlay() { player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); }

        function updateProgress() {
            if(player && player.getCurrentTime) {
                const perc = (player.getCurrentTime() / player.getDuration()) * 100;
                document.getElementById('p-bar').style.width = (perc || 0) + '%';
            }
        }

        function seek(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const p = (e.clientX - rect.left) / rect.width;
            player.seekTo(p * player.getDuration());
        }
    </script>
</body>
</html>
